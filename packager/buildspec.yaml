flags_map:
  Version: github.com/choria-io/provisioner/config.Version
  SHA: github.com/choria-io/provisioner/cmd.sha

foss:
  compile_targets:
    defaults:
      output: choria-provisioner-{{version}}-{{os}}-{{arch}}

    64bit_linux:
      os: linux
      arch: amd64

    aarch64_linux:
      os: linux
      arch: arm64

    ppc64le_linux:
      os: linux
      arch: ppc64le

  packages:
    defaults:
      name: choria-provisioner
      bindir: /usr/sbin
      etcdir: /etc/choria-provisioner
      release: 1
      manage_conf: 1

    el_64:
      dist: el
      template: el/generic
      target_arch: x86_64
      binary: 64bit_linux

    el_ppc64le:
      template: el/generic
      dist: el
      target_arch: ppc64le
      binary: ppc64le_linux

    el_aarch64:
      template: el/generic
      dist: el
      target_arch: aarch64
      binary: aarch64_linux
